<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::section})}">
<section>

  <h1 th:text="${mode == 'edit'} ? 'タスク編集' : 'タスク新規作成'">タスク新規作成</h1>

  <form th:object="${taskForm}"
        th:action="${mode == 'edit'} ? @{|/tasks/${taskId}|} : @{/tasks}"
        method="post">

    <div style="margin-bottom:12px;">
      <div>タイトル</div>
      <input type="text" th:field="*{title}" style="width: 260px;" />
      <div th:if="${#fields.hasErrors('title')}" th:errors="*{title}" style="color:red;"></div>
    </div>

    <div th:if="${mode == 'edit'}" style="margin-bottom:12px;">
      <label>
        <input type="checkbox" th:field="*{done}" />
        完了
      </label>
    </div>

    <button type="submit" th:text="${mode == 'edit'} ? '更新' : '登録'">登録</button>
    <a th:href="@{/tasks}">戻る</a>
  </form>

</section>
</html>
