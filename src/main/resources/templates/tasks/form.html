<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'タスク編集' : 'タスク登録'">タスクフォーム</title>
</head>
<body>
<h1 th:text="${isEdit} ? 'タスク編集' : 'タスク登録'">タスクフォーム</h1>

<form th:action="${isEdit} ? @{/tasks/{id}(id=${taskId})} : @{/tasks}" th:object="${taskForm}" method="post">
    <div>
        <label for="title">タイトル</label>
        <input type="text" id="title" th:field="*{title}">
        <div th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
    </div>

    <div>
        <label for="completed">完了</label>
        <input type="checkbox" id="completed" th:field="*{completed}">
    </div>

    <button type="submit" th:text="${isEdit} ? '更新' : '登録'">保存</button>
</form>

<p>
    <a th:href="@{/tasks}">一覧に戻る</a>
</p>
</body>
</html>
