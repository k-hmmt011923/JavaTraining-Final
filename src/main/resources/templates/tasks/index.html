<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <title>タスク一覧</title>
</head>
<body>
<h1>タスク一覧</h1>

<div th:if="${successMessage}">
    <p th:text="${successMessage}"></p>
</div>

<p>
    <a th:href="@{/tasks/new}">新規登録</a>
</p>

<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>タイトル</th>
        <th>完了状態</th>
        <th>操作</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="task : ${tasks}">
        <td th:text="${task.id}">1</td>
        <td th:text="${task.title}">サンプル</td>
        <td th:text="${task.completed ? '完了' : '未完了'}">未完了</td>
        <td>
            <a th:href="@{/tasks/{id}/edit(id=${task.id})}">編集</a>

            <form th:action="@{/tasks/{id}/toggle(id=${task.id})}" method="post" style="display:inline;">
                <button type="submit">完了切替</button>
            </form>

            <form th:action="@{/tasks/{id}/delete(id=${task.id})}" method="post" style="display:inline;">
                <button type="submit">削除</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
